name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, beta, alpha]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  test_unit_e2e:
    name: Run Test Units
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Use Node.js LTS version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/Krypton

      - name: Install dependency
        run: npm ci

      - name: Build output
        run: npm run build

      - name: Check Locale Consistency
        run: npm run locale:check

      - name: Run Test Units
        run: npm run test

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Browser version testing
        uses: cypress-io/github-action@948d67d3074f1bbb6379c8bdbb04e95d2f8e593f
        with:
          command-prefix: '--'
          install: false
          browser: chrome
          build: npm run setup:client
          start: npm run start:client
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_JW_EPUB_PARSER_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CYPRESS_PROJECT_ID: dvtrvb

  parse_languages:
    name: Test parsing for ${{ matrix.language }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          [
            BL,
            CH,
            CHS,
            CR,
            E,
            ELI,
            F,
            FI,
            G,
            H,
            HI,
            I,
            IL,
            J,
            K,
            KO,
            LSB,
            LSE,
            M,
            MG,
            ML,
            O,
            P,
            PGW,
            Q,
            S,
            ST,
            SV,
            SW,
            T,
            TG,
            TH,
            TK,
            TND,
            TNK,
            TPO,
            TTM,
            TW,
            U,
            VT,
            VZ,
            X,
            YW,
            Z,
          ]

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Use Node.js LTS version
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/Krypton

      - name: Install dependency
        run: npm ci

      - name: Build output
        run: npm run build

      - name: Test parsing for language
        run: npm run parse language ${{ matrix.language }}
